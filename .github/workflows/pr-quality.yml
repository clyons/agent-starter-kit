name: PR Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate PR body contains ExecPlan path or N/A reason
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: |
          BODY="$(gh pr view "$PR_NUMBER" --repo "$PR_REPO" --json body -q .body)"

          has_execplan=0
          has_na_reason=0

          if printf '%s' "$BODY" | grep -Eq '\.agent/execplans/[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9._-]+\.md'; then
            has_execplan=1
          fi

          if printf '%s' "$BODY" | grep -Eq 'N/A reason:[[:space:]]*[[:alnum:]]'; then
            has_na_reason=1
          fi

          recovery_hint() {
            echo
            echo "::notice::How to recover after editing the PR body:"
            echo "::notice::  This workflow now re-runs automatically on body edits."
            echo "::notice::  If it does not re-fire, push any commit, for example:"
            echo "::notice::  git commit --allow-empty -m rerun"
          }

          if [ "$has_execplan" -eq 0 ] && [ "$has_na_reason" -eq 0 ]; then
            echo "::error::PR body must include an ExecPlan path (for example, .agent/execplans/YYYY-MM-DD-slug.md) or a populated 'N/A reason: <text>' line."
            recovery_hint
            exit 1
          fi

          if ! printf '%s' "$BODY" | grep -q "Validation Evidence"; then
            echo "::error::PR body must include the Validation Evidence section."
            recovery_hint
            exit 1
          fi

  quality-checks:
    needs: pr-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node.js project
        id: node-project
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json found; skipping npm quality checks. Customize this job for non-Node projects."
          fi

      - name: Setup Node.js
        if: steps.node-project.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.node-project.outputs.present == 'true'
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        if: steps.node-project.outputs.present == 'true'
        run: npm run lint

      - name: Type check
        if: steps.node-project.outputs.present == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.node-project.outputs.present == 'true'
        run: npm run build

      # Add your own test/eval step here, for example:
      # - name: Run tests
      #   run: npm test
